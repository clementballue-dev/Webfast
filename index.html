<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 ScanDevoirs AI - Vision</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --accent: #38bdf8; --secondary: #818cf8;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .app-container { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--accent); text-align: center; margin: 0 0 5px 0; }
        .tagline { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; }
        
        /* Zone de saisie */
        textarea { width: 100%; height: 80px; background: #0f172a; color: white; border: 1px solid #475569; border-radius: 12px; padding: 12px; box-sizing: border-box; margin-bottom: 10px; outline: none; resize: none; }
        
        /* Zone Photo */
        .photo-zone { border: 2px dashed #475569; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .photo-zone:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }
        #preview { max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 10px; display: none; }
        
        /* Boutons */
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; background: linear-gradient(135deg, var(--accent), var(--secondary)); color: #0f172a; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 800; transition: 0.2s; }
        .btn-config { flex: 0.2; background: #334155; color: white; }
        button:active { transform: scale(0.96); }

        /* Résultats */
        #result { margin-top: 20px; padding: 15px; background: rgba(15, 23, 42, 0.5); border-radius: 12px; border: 1px solid var(--accent); display: none; line-height: 1.5; font-size: 0.95rem; }
        .loader { display: none; text-align: center; margin: 15px; color: var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="app-container">
    <h1>ScanDevoirs 📸</h1>
    <p class="tagline">Prends ton exercice en photo et l'IA s'en occupe.</p>
    
    <div class="photo-zone" onclick="document.getElementById('fileInput').click()">
        <span>Click pour ajouter une photo 🖼️</span>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="previewImage(event)">
        <img id="preview">
    </div>

    <textarea id="userInput" placeholder="Optionnel : Ajoute une consigne (ex: Explique l'étape 2)..."></textarea>
    
    <div class="btn-group">
        <button onclick="askAI()">ANALYSER & RÉSOUDRE</button>
        <button class="btn-config" onclick="configKey()">⚙️</button>
    </div>

    <div class="loader" id="loader">L'IA regarde ta photo... 👀</div>

    <div id="result">
        <div id="aiResponse"></div>
    </div>
</div>

<script>
    let base64Image = "";

    function configKey() {
        const key = prompt("Entre ta clé API Gemini :");
        if (key) localStorage.setItem('gemini_api_key', key);
    }

    function previewImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('preview').src = e.target.result;
            document.getElementById('preview').style.display = "block";
            base64Image = e.target.result.split(',')[1]; // On garde juste la data
        };
        reader.readAsDataURL(file);
    }

    async function askAI() {
        const text = document.getElementById('userInput').value || "Résous cet exercice proprement.";
        const KEY = localStorage.getItem('gemini_api_key');
        if (!KEY) return configKey();

        document.getElementById('loader').style.display = "block";
        document.getElementById('result').style.display = "none";

        const payload = {
            contents: [{
                parts: [
                    { text: "Tu es un tuteur. Analyse cette image, extrais l'exercice et donne la solution expliquée : " + text },
                    ...(base64Image ? [{ inline_data: { mime_type: "image/jpeg", data: base64Image } }] : [])
                ]
            }]
        };

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            const output = data.candidates[0].content.parts[0].text;
            
            document.getElementById('aiResponse').innerHTML = "<b>Analyse terminée :</b><br><br>" + output.replace(/\n/g, "<br>");
            document.getElementById('result').style.display = "block";
        } catch (e) {
            alert("Erreur. Vérifie ta clé ou la taille de l'image.");
        } finally {
            document.getElementById('loader').style.display = "none";
        }
    }
</script>

</body>
</html>
