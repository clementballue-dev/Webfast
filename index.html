<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Devoirs AI</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .drop-zone { border: 2px dashed #38bdf8; border-radius: 15px; padding: 40px 10px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        #preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        button { width: 100%; background: #38bdf8; color: #0f172a; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; display: none; line-height: 1.5; border-left: 4px solid #38bdf8; }
        .loader { display: none; text-align: center; margin: 15px; color: #38bdf8; }
        .config { text-align: right; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="config"><button onclick="setKey()" style="width: auto; padding: 5px 10px; font-size: 0.7rem;">⚙️ CLÉ API</button></div>
    <h2 style="text-align: center; color: #38bdf8;">Scan & Résous 📸</h2>
    
    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span id="txt">Appuie pour choisir une photo de l'exercice</span>
        <input type="file" id="fileInput" accept="image/*" hidden onchange="processImage(this)">
        <img id="preview">
    </div>

    <button onclick="sendToAI()">OBTENIR LA RÉPONSE 🚀</button>

    <div class="loader" id="loading">L'IA analyse l'image... ⏳</div>
    <div id="result"></div>
</div>

<script>
    let imgData = "";

    function setKey() {
        const k = prompt("Colle ta clé API Gemini :");
        if(k) localStorage.setItem('gemini_key', k);
    }

    function processImage(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('preview').src = e.target.result;
            document.getElementById('preview').style.display = "block";
            document.getElementById('txt').style.display = "none";
            imgData = e.target.result.split(',')[1];
        };
        reader.readAsDataURL(file);
    }

    async function sendToAI() {
        const key = localStorage.getItem('gemini_key');
        if(!key) return setKey();
        if(!imgData) return alert("Choisis une photo d'abord !");

        document.getElementById('loading').style.display = "block";
        document.getElementById('result').style.display = "none";

        const payload = {
            contents: [{
                parts: [
                    { text: "Regarde bien cette image d'exercice. Identifie les questions et donne les réponses détaillées." },
                    { inline_data: { mime_type: "image/jpeg", data: imgData } }
                ]
            }]
        };

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const d = await r.json();
            const text = d.candidates[0].content.parts[0].text;
            document.getElementById('result').innerHTML = "<b>Réponse :</b><br><br>" + text.replace(/\n/g, "<br>");
            document.getElementById('result').style.display = "block";
        } catch (e) {
            alert("Erreur. Vérifie ta clé.");
        } finally {
            document.getElementById('loading').style.display = "none";
        }
    }
</script>
</body>
</html>
